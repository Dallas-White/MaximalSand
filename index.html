<!doctype html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Emscripten-Generated Code</title>
</head>

<body style="margin:0px">
  <style>
    .spinner {
      width: 50px;
      height: 50px;
      border: 6px solid #ddd;
      border-top: 6px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
  <div>
    <canvas id="canvas" style="display: block; height: 100vh; width: 100vw; height: 100dvh; width: 100dvw; z-index: 1;"
      oncontextmenu="event.preventDefault(); event.stopPropagation(); return false" tabindex=-1></canvas>
    <div id="overlay" style="position: absolute;top: 0;left: 0; z-index: 2;width: 100%; height: 100%; pointer-events: none;   display: flex;
  justify-content: center;
  align-items: center;">
      <div class="spinner" id='spinner'></div>
      <div id="status">Downloading...</div>
      <div>
        <progress value="0" max="100" id="progress" hidden=1></progress>
      </div>
    </div>
  </div>
  <script>

    var statusElement = document.getElementById('status');
    var progressElement = document.getElementById('progress');
    var spinnerElement = document.getElementById('spinner');
    var canvasElement = document.getElementById('canvas');
    if (window.screen.width < 320 || window.screen.height < 480) {
      alert("Your Browser Window is too small")
      statusElement.innerHTML = "Your Browser is too small";
      canvasElement.display = false;
    } else {
      canvasElement.addEventListener('webglcontextlost', (e) => {
        alert('WebGL context lost. You will need to reload the page.');
        e.preventDefault();
      }, false);

      window.addEventListener('resize', () => {
        if (window.screen.width < 320 || window.screen.height < 480) {
          statusElement.innerHTML = "Your Browser is too small";
          canvasElement.display = false;
        } else {
          statusElement.innerHTML = "";
          canvasElement.display = true;
        }

      });

      var Module = {
        print(...args) {
          console.log(...args);
        },
        canvas: canvasElement,
        setStatus(text) {
          if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
          if (text === Module.setStatus.last.text) return;
          var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          var now = Date.now();
          // if this is a progress update, skip it if too soon
          if (m && now - Module.setStatus.last.time < 30) return;
          Module.setStatus.last.time = now;
          Module.setStatus.last.text = text;
          if (m) {
            text = m[1];
            progressElement.value = parseInt(m[2]) * 100;
            progressElement.max = parseInt(m[4]) * 100;
            progressElement.hidden = false;
            spinnerElement.hidden = false;
          } else {
            progressElement.value = null;
            progressElement.max = null;
            progressElement.hidden = true;
            if (!text) spinnerElement.style.display = 'none';
          }
          statusElement.innerHTML = text;
        },
        totalDependencies: 0,
        monitorRunDependencies(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
        }
      };

      canvasElement.width = window.innerWidth;
      canvasElement.height = window.innerHeight;
      Module.setStatus('Downloading...');
      window.onerror = (event) => {
        Module.setStatus('Exception thrown, please reload the page');
        canvasElement.style.display = 'none'
        spinnerElement.style.display = 'none';
        Module.setStatus = (text) => {
          if (text) console.error('[post-exception status] ' + text);
        };
      };
      var jsFilePath = "./MaximalSand.js"
      if (!crossOriginIsolated) {
        jsFilePath = "./MaximalSand_st.js"
      }
      var js = document.createElement("script");
      js.type = "text/javascript";
      js.src = jsFilePath;
      document.body.appendChild(js);
    }
  </script>
</body>

</html>
